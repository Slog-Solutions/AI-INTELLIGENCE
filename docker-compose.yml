version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: atip
      POSTGRES_USER: atip_user
      POSTGRES_PASSWORD: atip_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./vector_store:/app/vector_store
    ports:
      - 8000:8000
    environment:
      DATABASE_URL: postgresql+psycopg2://atip_user:atip_pass@postgres:5432/atip
      JWT_SECRET_KEY: change-me-secret
      OLLAMA_URL: http://localhost:11434

volumes:
  postgres_data:
    driver: local
